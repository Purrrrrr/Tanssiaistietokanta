type Query {
  workshop(id: ID!): Workshop!
}

type Workshop {
  _id: ID!
  eventId: ID!
  event: Event!
  name: String!
  abbreviation: String
  description: String
  teachers: [Teacher!]!
  assistant_teachers: [Teacher!]!
  danceIds: [ID!]!
  dances: [Dance!]!
  instances: [WorkshopInstance!]!
  instanceSpecificDances: Boolean!
}

type Teacher {
  _id: ID!
  name: String!
}

type WorkshopInstance {
  _id: ID!
  abbreviation: String!
  description: String!
  dateTime: String!
  durationInMinutes: Float!
  danceIds: [ID!]
  dances: [Dance!]
}

type Mutation {
  createWorkshop(eventId: ID!, workshop: WorkshopInput!): Workshop!
  patchWorkshop(id: ID!, workshop: WorkshopPatchInput!): Workshop!
  deleteWorkshop(id: ID!): Workshop!
}

input WorkshopInput {
  name: String!
  abbreviation: String
  description: String
  teacherIds: [ID!]
  assistantTeacherIds: [ID!]
  ocurrences: [String!]
  instances: [WorkshopInstanceInput!]!
  instanceSpecificDances: Boolean!
}

input WorkshopPatchInput {
  name: String
  abbreviation: String
  description: String
  teacherIds: [ID!]
  assistantTeacherIds: [ID!]
  ocurrences: [String!]
  instances: [WorkshopInstanceInput!]
  instanceSpecificDances: Boolean
}

input WorkshopInstanceInput {
  _id: ID!
  abbreviation: String
  description: String
  dateTime: String
  durationInMinutes: Float
  danceIds: [ID!]
}
