type Query {
  workshop(id: ID!, eventVersionId: ID): Workshop!
}

type Workshop {
  _id: ID!
  _versionId: ID
  eventId: ID!
  event: Event!
  name: String!
  abbreviation: String
  description: DocumentContent
  danceIds: [ID!]!
  dances: [Dance!]!
  instances: [WorkshopInstance!]!
  instanceSpecificDances: Boolean!
  volunteerAssignments: [VolunteersByRole!]!
}

type Teacher {
  _id: ID!
  name: String!
}

type WorkshopInstance {
  _id: ID!
  abbreviation: String!
  dateTime: String!
  durationInMinutes: Float!
  danceIds: [ID!]
  dances: [Dance!]
}

type Mutation {
  createWorkshop(eventId: ID!, workshop: WorkshopInput!): Workshop!
  patchWorkshop(id: ID!, workshop: WorkshopPatchInput!): Workshop!
  deleteWorkshop(id: ID!): Workshop!
}

input WorkshopInput {
  name: String!
  abbreviation: String
  description: DocumentContent 
  teacherIds: [ID!]
  assistantTeacherIds: [ID!]
  ocurrences: [String!]
  instances: [WorkshopInstanceInput!]!
  instanceSpecificDances: Boolean!
}

input WorkshopInstanceInput {
  _id: ID!
  abbreviation: String
  dateTime: String
  durationInMinutes: Float
  danceIds: [ID!]
}

input WorkshopPatchInput {
  name: String
  abbreviation: String
  description: DocumentContent
  teacherIds: [ID!]
  assistantTeacherIds: [ID!]
  ocurrences: [String!]
  instances: [WorkshopInstanceFullInput!]
  instanceSpecificDances: Boolean
}

input WorkshopInstanceFullInput {
  _id: ID!
  abbreviation: String!
  dateTime: String!
  durationInMinutes: Float!
  danceIds: [ID!]
}
