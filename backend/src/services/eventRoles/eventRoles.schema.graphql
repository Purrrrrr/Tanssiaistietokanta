type Query {
  eventRole(id: ID!, versionId: ID): EventRole!
  eventRoles(appliesToWorkshops: Boolean): [EventRole!]!
}

type EventRole implements Versionable {
  _id: ID!
  _versionId: String
  _versionNumber: String
  _updatedAt: String!
  versionHistory: VersionHistory!
  name: String!
  description: String!
  plural: String!
  appliesToWorkshops: Boolean!
  order: Float!
}

type Mutation {
  createEventRole(eventRole: EventRoleInput!): EventRole!
  modifyEventRole(id: ID!, eventRole: EventRoleInput!): EventRole!
  patchEventRole(id: ID!, eventRole: EventRolePatchInput!): EventRole!
  deleteEventRole(id: ID!): EventRole!
}

input EventRoleInput {
  name: String!
  description: String
  plural: String
  appliesToWorkshops: Boolean
  order: Float
}

input EventRolePatchInput {
  name: String
  description: String
  plural: String
  appliesToWorkshops: Boolean
  order: Float
}
