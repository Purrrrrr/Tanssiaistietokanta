#   deleteEventRole(id: ID!): EventRole!
# }

input EventRoleInput {
  name: String!
  description: String
  plural: String
  appliesToWorkshops: Boolean
  order: Float
}

input EventRolePatchInput {
  name: String
  description: String
  plural: String
  appliesToWorkshops: Boolean
  order: Float
}
