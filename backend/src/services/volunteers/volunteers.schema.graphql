type Query {
  volunteer(id: ID!): Volunteer!
  volunteers: [Volunteer!]!
}

type Volunteer {
  _id: ID!
  name: String!
  email: String
  phone: String
  contact_details: [JSON]!
}

scalar JSON

type Mutation {
  createVolunteer(volunteer: VolunteerInput!): Volunteer!
  modifyVolunteer(id: ID!, volunteer: VolunteerInput!): Volunteer!
  patchVolunteer(id: ID!, volunteer: VolunteerPatchInput!): Volunteer!
  deleteVolunteer(id: ID!): Volunteer!
}

input VolunteerInput {
  name: String!
  email: String
  phone: String
  contact_details: [JSON]
}

input VolunteerPatchInput {
  name: String
  email: String
  phone: String
  contact_details: [JSON]
}
