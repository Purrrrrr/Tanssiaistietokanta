type Query {
  volunteer(id: ID!, versionId: ID): Volunteer!
  volunteers: [Volunteer!]!
}

type Volunteer implements Versionable {
  _id: ID!
  _versionId: String
  _versionNumber: String
  _updatedAt: String!
  versionHistory: VersionHistory!
  name: String!
  duplicatedBy: ID
  volunteeredIn(eventId: ID): [VolunteeredInWorkshop!]!
}

type VolunteeredInWorkshop {
  _id: ID!
  workshop: Workshop!
  roles: [String!]!
}

type Mutation {
  createVolunteer(volunteer: VolunteerInput!): Volunteer!
  modifyVolunteer(id: ID!, volunteer: VolunteerInput!): Volunteer!
  patchVolunteer(id: ID!, volunteer: VolunteerPatchInput!): Volunteer!
  deleteVolunteer(id: ID!): Volunteer!
}

input VolunteerInput {
  name: String!
  duplicatedBy: ID
}

input VolunteerPatchInput {
  name: String
  duplicatedBy: ID
}
