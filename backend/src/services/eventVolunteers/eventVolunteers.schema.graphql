type Query {
  eventVolunteer(id: ID!, versionId: ID): EventVolunteer!
  eventVolunteers(eventId: ID, eventVersionId: ID, volunteerId: ID): [EventVolunteer!]!
}

enum EventVolunteerStatus {
  Interested
  Accepted
  CanWorkAsBackup
  Rejected
  Cancelled
}

type EventVolunteer implements Versionable {
  _id: ID!
  _versionId: String
  _versionNumber: String
  _updatedAt: String!
  versionHistory: VersionHistory!
  eventId: ID!
  volunteerId: ID!
  volunteer: Volunteer!
  status: EventVolunteerStatus!
  interestedIn: [EventRole!]!
  acceptedRoles: [EventRole!]!
  wishes: String!
  notes: String!
}

type Mutation {
  createEventVolunteer(eventVolunteer: EventVolunteerInput!): EventVolunteer!
  patchEventVolunteer(id: ID!, eventVolunteer: EventVolunteerPatchInput!): EventVolunteer!
  deleteEventVolunteer(id: ID!): EventVolunteer!
}

input EventVolunteerInput {
  eventId: ID!
  volunteerId: ID!
  status: EventVolunteerStatus
  interestedIn: [ID!]
  acceptedRoles: [ID!]
  wishes: String
  notes: String
}

input EventVolunteerPatchInput {
  eventId: ID
  volunteerId: ID
  status: EventVolunteerStatus
  interestedIn: [ID!]
  acceptedRoles: [ID!]
  wishes: String
  notes: String
}
