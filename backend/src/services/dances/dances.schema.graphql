type Query {
  dance(id: ID!, versionId: ID): Dance!
  danceCategories: [String!]!
  dances: [Dance!]!
}

type Dance implements Versionable {
  _id: ID!
  _versionId: String
  _versionNumber: String
  _updatedAt: String!
  versionHistory: VersionHistory!
  name: String!
  description: DocumentContent
  duration: Float
  prelude: String
  formation: String
  source: String
  category: String
  instructions: DocumentContent
  remarks: String
  teachedIn(eventId: ID): [TeachedInWorkshop!]!
  slideStyleId: ID
  events: [Event!]!
  wikipageName: String
  wikipage: Wikipage
  tags: Tags
  formationDiagrams: [FormationDiagram!]!
}

scalar Tags

type TeachedInWorkshop {
  _id: ID!
  workshop: Workshop!
  instances: [WorkshopInstance!]
}

type FormationInstructions {
  _id: ID!
  ballroomId: ID
  ballroom: Ballroom
  description: String
  diagram: Diagram
}

type Mutation {
  createDance(dance: DanceInput!): Dance!
  patchDance(id: ID!, dance: JSONPatch!): Dance!
  deleteDance(id: ID!): Dance!
}

input DanceInput {
  name: String!
  description: String
  duration: Float
  prelude: String
  formation: String
  source: String
  remarks: String
  category: String
  instructions: String
  wikipageName: String
  formationDiagramIds: [ID!]
}

input FormationInstructionsInput {
  _id: ID!
  ballroomId: ID
  description: String
  diagram: Diagram
}

input DancePatchInput {
  name: String
  description: String
  duration: Float
  prelude: String
  formation: String
  source: String
  remarks: String
  category: String
  instructions: String
  wikipageName: String
}
