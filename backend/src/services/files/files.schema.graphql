type Query {
  file(id: ID!): File!
  files(owner: FileOwner!, owningId: ID!, path: String): [File!]!
  filesCount(owner: FileOwner!, owningId: ID!, path: String): Int!
}

type File {
  _id: ID!
  _createdAt: String!
  _updatedAt: String!
  owner: FileOwner!
  owningId: ID!
  path: String!
  name: String!
  notes: String!
  mimetype: String!
  size: Int!
  mediaType: FileMediaType
  mediaFormat: String
  mediaDurationMs: Int
  mediaWidth: Int
  mediaHeight: Int
  unused: Boolean!
}

enum FileMediaType {
  image
  audio
  video
}

enum FileOwner {
  dances
  events
  workshops
  documents
}

type Mutation {
  renameFile(id: ID!, name: String!, path: String): File!
  markFileUsage(usages: [FileUsageInput!]!): [File!]!
  moveFile(id: ID!, name: String!, path: String): File!
  deleteFile(id: ID!): File!
}

input FileUsageInput {
  _id: ID!
  unused: Boolean!
}
