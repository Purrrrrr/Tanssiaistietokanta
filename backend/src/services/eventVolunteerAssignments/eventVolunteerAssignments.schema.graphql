type VolunteersByRole {
  _id: ID!
  _eventId: ID!
  _workshopId: ID
  role: EventRole!
  volunteers: [Volunteer!]!
}

type Query {
  eventVolunteerAssignment(id: ID!, versionId: ID): EventVolunteerAssignment!
  eventVolunteerAssignments(eventId: ID, eventVersionId: ID, workshopId: ID, workshopVersionId: ID, workshopInstanceId: ID, roleId: ID, volunteerId: ID): [EventVolunteerAssignment!]!
}

enum EventVolunteerRegistrationStatus {
  None
  RegisteredToEventSystem
  AcceptedRegistration
  InformedToOrganizers
  RegistrationCancelled
}

type EventVolunteerAssignment implements Versionable {
  _id: ID!
  _versionId: String
  _versionNumber: String
  _updatedAt: String!
  versionHistory: VersionHistory!
  eventId: ID!
  event: Event!
  workshopId: ID
  workshop: Workshop
  workshopInstanceIds: [ID!]
  # workshopInstance: WorkshopInstance
  roleId: ID!
  role: EventRole!
  volunteerId: ID!
  volunteer: Volunteer!
  eventVolunteer: EventVolunteer!
  registrationStatus: EventVolunteerRegistrationStatus!
}

type Mutation {
  createEventVolunteerAssignment(eventVolunteerAssignment: EventVolunteerAssignmentInput!): EventVolunteerAssignment!
  setEventVolunteerAssignmentWorkshopInstances(id: ID!, workshopInstanceIds: [ID!]): EventVolunteerAssignment!
  setEventVolunteerAssignmentRegistrationStatus(id: ID!, registrationStatus: EventVolunteerRegistrationStatus!): EventVolunteerAssignment!
  deleteEventVolunteerAssignment(id: ID!): EventVolunteerAssignment!
}

input EventVolunteerAssignmentInput {
  eventId: ID!
  workshopId: ID
  workshopInstanceIds: [ID!]
  roleId: ID!
  volunteerId: ID!
  registrationStatus: EventVolunteerRegistrationStatus!
}
