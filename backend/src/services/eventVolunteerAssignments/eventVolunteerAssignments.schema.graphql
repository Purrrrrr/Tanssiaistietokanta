type VolunteersByRole {
  _id: ID!
  _eventId: ID!
  _workshopId: ID
  role: EventRole!
  volunteers: [Volunteer!]!
}

type Query {
  eventVolunteerAssignment(id: ID!, versionId: ID): EventVolunteerAssignment!
  eventVolunteerAssignments(eventId: ID, eventVersionId: ID, workshopId: ID, workshopVersionId: ID, workshopInstanceId: ID, roleId: ID): [EventVolunteerAssignment!]!
}

type EventVolunteerAssignment implements Versionable {
  _id: ID!
  _versionId: String
  _versionNumber: String
  _updatedAt: String!
  versionHistory: VersionHistory!
  eventId: ID!
  event: Event!
  workshopId: ID
  workshop: Workshop
  workshopInstanceId: ID
  workshopInstance: WorkshopInstance
  roleId: ID!
  role: EventRole!
  volunteerId: ID!
  volunteer: Volunteer!
}

type Mutation {
  createEventVolunteerAssignment(eventVolunteerAssignment: EventVolunteerAssignmentInput!): EventVolunteerAssignment!
  setEventVolunteerAssignmentWorkshopInstance(id: ID!, workshopInstanceId: ID): EventVolunteerAssignment!
  # patchEventVolunteerAssignment(id: ID!, eventVolunteerAssignment: EventVolunteerAssignmentPatchInput!): EventVolunteerAssignment!
  deleteEventVolunteerAssignment(id: ID!): EventVolunteerAssignment!
}

input EventVolunteerAssignmentInput {
  eventId: ID!
  workshopId: ID
  workshopInstanceId: ID
  roleId: ID!
  volunteerId: ID!
}

input EventVolunteerAssignmentPatchInput {
  eventId: ID
  workshopId: ID
  workshopInstanceId: ID
  roleId: ID
  volunteerId: ID
}
